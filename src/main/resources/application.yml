server:
  port: 8080

spring:
  application:
    name: ai-agent-eval-pipeline

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.swiggy.assignment: DEBUG
    org.springframework.web: INFO
